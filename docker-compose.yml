version: '3.8'

services:
  # 로드밸런서 추가
  nginx:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
      - backend-2
    networks:
      - backend-net

  # 서버 1
  backend-1:
    image: well4149/schedule-management:latest
    container_name: schedule-backend-1
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8081
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/schedule?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - MAIL_TEST_HOST=${MAIL_TEST_HOST}
      - MAIL_TEST_PORT=${MAIL_TEST_PORT}
      - MAIL_TEST_USERNAME=${MAIL_TEST_USERNAME}
      - MAIL_TEST_PASSWORD=${MAIL_TEST_PASSWORD}
    depends_on:
      - kafka
      - redis
    networks:
      - backend-net

  # 서버 2
  backend-2:
    image: well4149/schedule-management:latest
    container_name: schedule-backend-2
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SERVER_PORT=8082
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/schedule?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - MAIL_TEST_HOST=${MAIL_TEST_HOST}
      - MAIL_TEST_PORT=${MAIL_TEST_PORT}
      - MAIL_TEST_USERNAME=${MAIL_TEST_USERNAME}
      - MAIL_TEST_PASSWORD=${MAIL_TEST_PASSWORD}
    depends_on:
      - kafka
      - redis
    networks:
      - backend-net

  redis:
    image: redis:6.2
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - backend-net

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    ports:
      - "9093:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend-net

networks:
  backend-net:
