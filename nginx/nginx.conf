events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 로드밸런싱 설정: 포트 번호를 다르게 지정
    upstream backend-cluster {
        server schedule-backend-1:8082;
        server schedule-backend-2:8082;
    }

    # 80 포트 → https 리다이렉트
    server {
        listen 80;
        #server_name api.schedulemanagement.site;
        server_name localhost;

        #location /.well-known/acme-challenge/ {
        #    root /var/www/certbot;
        #}

        location /metrics {
                    stub_status on;
                    allow all;
        }

        location /api/actuator/prometheus {
            #proxy_pass http://backend:8082/actuator/prometheus;
            proxy_pass http://backend-cluster/actuator/prometheus;
            proxy_set_header Host $host;
        }

        #location /redis-exporter/ {
        #    proxy_pass http://redis-exporter:9121/;
        #}

        #location /kafka-exporter/ {
        #    proxy_pass http://kafka-exporter:9308/;
        #}

        location /api/ {
                proxy_pass http://backend-cluster/api/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                # JMeter에서 어느 서버로 갔는지 확인용
                add_header X-Upstream-Addr $upstream_addr always;

                # SPOF용
                proxy_next_upstream error timeout http_500 http_502 http_503;
                proxy_next_upstream_tries 2;
                proxy_connect_timeout 1s;
                proxy_read_timeout 5s;
        }

        location /ws/ {
                proxy_pass http://backend-cluster/ws/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
        }

        # 로컬 테스트 시 리다이렉트 주석처리
        # location / {
        #     return 301 https://$host$request_uri;
        # }
    }

